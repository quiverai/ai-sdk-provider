name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run QA suite
        run: pnpm qa

  real-api-smoke:
    name: Real API Smoke
    needs: qa
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run real QuiverAI smoke tests
        shell: bash
        run: |
          if [ -z "$QUIVER_API_KEY" ]; then
            echo "QUIVER_API_KEY is not configured; skipping real QuiverAI smoke tests."
            exit 0
          fi

          pnpm test:e2e
        env:
          RUN_REAL_API_SMOKE_TEST: "true"
          QUIVER_API_KEY: ${{ secrets.QUIVER_API_KEY }}
          QUIVER_MODEL_ID: arrow-preview
