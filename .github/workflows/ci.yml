name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run QA suite
        run: pnpm qa

  real-api-smoke:
    name: Real API Smoke
    needs: qa
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && (github.event_name != 'pull_request' || github.base_ref == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run real QuiverAI smoke tests
        run: pnpm test:smoke:live
        env:
          QUIVERAI_LIVE_SMOKE: "1"
          QUIVERAI_API_KEY: ${{ secrets.QUIVERAI_API_KEY }}
          QUIVERAI_SMOKE_MODEL_ID: arrow-1

  examples:
    name: Examples
    needs: qa
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && (github.event_name != 'pull_request' || github.base_ref == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Create raster fixture
        shell: bash
        run: |
          cat <<'EOF' | base64 --decode > /tmp/quiverai-example.png
          iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
          EOF

      - name: Run QuiverAI examples
        shell: bash
        run: |
          if [ -z "$QUIVERAI_API_KEY" ]; then
            echo "QUIVERAI_API_KEY is not configured; skipping QuiverAI examples."
            exit 0
          fi

          pnpm exec tsx examples/generate-image.ts "Generate a simple geometric SVG icon."
        env:
          QUIVERAI_API_KEY: ${{ secrets.QUIVERAI_API_KEY }}
          QUIVERAI_MODEL_ID: arrow-1
